<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OPhim TV — Xem Phim Online</title>
  <meta name="description" content="Ứng dụng xem phim Smart TV với hàng ngàn bộ phim vietsub chất lượng cao">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css">
  <!-- HLS.js for video playback -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
</head>

<body>

  <div id="app">

    <nav id="sidebar">
      <div class="logo">CINEMA</div>
      <button class="nav-item active" data-screen="home" tabindex="0">
        <span class="nav-icon" style="font-variation-settings: 'FILL' 1;">home</span>
        <span>Home</span>
      </button>
      <button class="nav-item" data-screen="browse" tabindex="0">
        <span class="nav-icon">explore</span>
        <span>Discover</span>
      </button>
      <button class="nav-item" data-screen="search" tabindex="0">
        <span class="nav-icon">search</span>
        <span>Search</span>
      </button>
    </nav>

    <!-- ── MAIN CONTENT ── -->
    <div id="main">

      <!-- HOME SCREEN -->
      <section class="screen active" id="screen-home">
        <!-- Hero Banner -->
        <div id="hero">
          <div id="hero-bg"></div>
          <div id="hero-content">
            <div id="hero-badges"></div>
            <div id="hero-title">Đang tải...</div>
            <div id="hero-meta"></div>
            <div id="hero-desc"></div>
            <div id="hero-btns">
              <button class="btn btn-primary" id="btn-hero-play" tabindex="0">▶ Xem Ngay</button>
            </div>
          </div>
          <div id="hero-dots"></div>
        </div>
        <!-- Dynamic content -->
        <div id="home-main"></div>
      </section>

      <!-- BROWSE SCREEN -->
      <section class="screen" id="screen-browse">
        <div class="screen-header">
          <h1 class="screen-title">Khám Phá Phim</h1>
        </div>
        <div id="browse-main"></div>
      </section>

      <!-- SEARCH SCREEN -->
      <section class="screen" id="screen-search">
        <div class="screen-header">
          <h1 class="screen-title">Tìm Kiếm</h1>
        </div>
        <div id="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Nhập tên phim..." autocomplete="off" tabindex="0">
          <button id="mic-btn" tabindex="0" title="Tìm kiếm bằng giọng nói">🎤</button>
        </div>
        <div id="search-results" class="card-grid"></div>
      </section>

      <!-- DETAIL SCREEN -->
      <section class="screen" id="screen-detail">
        <div id="detail-backdrop"></div>
        <div id="detail-content"></div>
      </section>

    </div><!-- end #main -->

  </div><!-- end #app -->

  <!-- ── PLAYER (overlay, always on top) ── -->
  <div id="player-screen">
    <div id="video-container">
      <video id="video-el" playsinline></video>

      <div id="player-controls">
        <!-- Seek flash -->
        <div id="seek-flash"></div>
        <!-- Episode jump overlay -->
        <div id="ep-jump-overlay"></div>
        <!-- Auto-next overlay -->
        <div id="autonext-overlay">
          <div id="autonext-count">10</div>
          <div id="autonext-text">Tự động phát tập tiếp theo</div>
          <button id="autonext-cancel" tabindex="0">Hủy</button>
        </div>
        <!-- Episode panel -->
        <div id="player-ep-panel"></div>

        <div id="player-controls-inner">
          <div id="progress-bar">
            <div id="progress-fill"></div>
            <div id="progress-thumb"></div>
          </div>
          <div class="player-row">
            <button class="player-btn" id="btn-back" tabindex="0" title="Thoát (Esc)">✕</button>
            <button class="player-btn" id="btn-prev" tabindex="0" title="Tập trước">⏮</button>
            <button class="player-btn" id="btn-play" tabindex="0" title="Phát/Dừng (Space)">▶</button>
            <button class="player-btn" id="btn-next" tabindex="0" title="Tập tiếp">⏭</button>
            <span id="player-time">0:00 / 0:00</span>
            <input type="range" id="volume-slider" min="0" max="100" value="100" tabindex="0" title="Âm lượng">
            <div class="player-spacer"></div>
            <span id="player-title"></span>
            <button class="player-btn" id="btn-ep-panel" tabindex="0" title="Danh sách tập">☰</button>
          </div>
        </div>
      </div>

    </div><!-- end video-container -->
  </div><!-- end player-screen -->

  <!-- ── VOICE SEARCH OVERLAY ── -->
  <div id="voice-overlay">
    <div class="voice-circle">🎤</div>
    <div id="voice-status">Đang nghe...</div>
    <div id="voice-result"></div>
    <div style="color:var(--text2);font-size:13px">Nhấn bất kỳ để hủy</div>
  </div>

  <!-- Toast notification -->
  <div id="toast"></div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/store.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/player.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
